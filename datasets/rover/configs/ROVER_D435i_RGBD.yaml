%YAML:1.0

#--------------------------------------------------------------------------------------------
# ROVER D435i RGB-D Configuration for ORB-SLAM3
# Camera: Intel RealSense D435i (RGB-D, PinHole + radtan distortion)
# Resolution: 640x480
#--------------------------------------------------------------------------------------------
File.version: "1.0"

Camera.type: "PinHole"

# D435i RGB intrinsics (from calib_d435i.yaml)
Camera1.fx: 596.1950425915236
Camera1.fy: 593.1411835433107
Camera1.cx: 327.0463454538411
Camera1.cy: 245.16142133264628

# radtan (Brown-Conrady) distortion
Camera1.k1: 0.07561607662577634
Camera1.k2: -0.2088729975389971
Camera1.p1: -0.0023347441072184756
Camera1.p2: 0.004010356017731083

# camera resolution
Camera.width: 640
Camera.height: 480

Camera.fps: 30
Camera.RGB: 1

# stereo baseline (approx D435i IR baseline, for depth thresholding)
Stereo.ThDepth: 40.0
Stereo.b: 0.05

# depth map factor: mm -> meters
RGBD.DepthMapFactor: 1000.0

#--------------------------------------------------------------------------------------------
# ORB params
#--------------------------------------------------------------------------------------------

ORBextractor.nFeatures: 1500
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer params
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
