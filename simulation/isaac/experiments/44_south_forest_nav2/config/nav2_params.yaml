bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    default_nav_to_pose_bt_xml: "/workspace/simulation/isaac/experiments/44_south_forest_nav2/config/nav2_bt_exp44.xml"
    default_nav_through_poses_bt_xml: "/workspace/simulation/isaac/config/nav2_bt_through_poses.xml"
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 15.0
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: True
      xy_goal_tolerance: 1.5
      yaw_goal_tolerance: 3.14
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.4                            # v17: cmd 0.4 -> actual ~1.4 m/s (slightly over 1.2 cap but needed to make timely progress)
      lookahead_dist: 1.0                                # mid v6 (1.2) and v13 (0.8)
      min_lookahead_dist: 0.4
      max_lookahead_dist: 1.5                            # was 2.0 - slightly capped
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.15                 # allow slower approach but not 0.1 (too slow)
      approach_velocity_scaling_dist: 1.2                # brake within 1.2m of goal (was 0.6)
      use_collision_detection: false                    # was true - RPP was cancelling rollouts when path touched ANY inflated cells; forest has continuous inflation
      max_allowed_time_to_collision_up_to_carrot: 3.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false # was true - killed speed in continuous inflated zones
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.15          # was 0.3 - allow crawling through passages
      use_rotate_to_heading: false
      allow_reversing: false
      max_robot_pose_search_dist: 10.0
      transform_tolerance: 0.5
      cost_scaling_dist: 1.0                            # was 1.5 - cost decay starts closer
      cost_scaling_gain: 0.5                            # was 1.0 - softer cost peaks
      inflation_cost_scaling_factor: 1.5                # was 3.0 - faster falloff, less of map covered

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.1
      robot_radius: 0.35
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True    # v11: re-enabled - BT BackUp removal should stop feedback drift
        observation_sources: depth_cloud
        depth_cloud:
          topic: /depth_points
          sensor_model: point_cloud
          max_obstacle_height: 0.8
          min_obstacle_height: 0.2
          obstacle_max_range: 3.0
          obstacle_min_range: 0.3
          clearing: True
          marking: True
          data_type: "PointCloud2"
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.3
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.35
      resolution: 0.2
      track_unknown_space: false
      rolling_window: false
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True    # v11: re-enabled - BT BackUp removal should stop feedback drift
        observation_sources: depth
        depth:
          topic: /depth_points
          data_type: "PointCloud2"
          marking: true
          clearing: true
          min_obstacle_height: 0.2
          max_obstacle_height: 0.8
          obstacle_max_range: 3.0
          raytrace_max_range: 4.0
          inf_is_valid: false
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.3
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      # v18: SmacPlanner2D considers robot footprint when planning,
      # avoids narrow halo gaps that NavFn would pick (1-cell gaps too
      # tight for 0.7m robot through inflated zones)
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 2.0
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      motion_model_for_search: "MOORE"
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false

smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 0.6]                        # v17: cmd 0.5 -> ~1.7 m/s actual MAX. controller usually outputs 0.4 (~1.4 actual)
    min_velocity: [-0.2, 0.0, -0.6]
    max_accel: [1.5, 0.0, 2.0]                           # back to faster accel
    max_decel: [-2.0, 0.0, -2.0]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
