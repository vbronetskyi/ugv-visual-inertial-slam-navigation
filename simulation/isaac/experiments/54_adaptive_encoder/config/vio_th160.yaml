%YAML:1.0
Camera.type: "PinHole"
Camera.fx: 320.0
Camera.fy: 320.0
Camera.cx: 320.0
Camera.cy: 240.0
Camera.k1: 0.0
Camera.k2: 0.0
Camera.p1: 0.0
Camera.p2: 0.0
Camera.width: 640
Camera.height: 480
Camera.fps: 10
Camera.RGB: 0
Camera.bf: 40.0
ThDepth: 160.0
DepthMapFactor: 1000.0

# Disable loop closing (single-pass teach-and-repeat; requires patched
# libORB_SLAM3.so with LoopClosing.cc::Run() early-exit when !mbActiveLC).
loopClosing: 0

# --- IMU noise model ---
# ORB-SLAM3 reads these as continuous noise density (per-√Hz). At Tracking.cc:616
# it computes sf = sqrt(ImuFreq) and uses Ng*sf, Na*sf as per-step discrete std.
# So yaml Na=0.02 means per-step std = 0.02*sqrt(200) = 0.283 m/s².
#
# Measured actuals on our position-double-diff synth IMU (v2/v3/v5/v6 style):
#   ax discrete std = 3.87 m/s²  ->  density = 3.87/sqrt(200) = 0.274
#   ay/az discrete std = 1.22/1.29 -> density ~ 0.09 (roughly isotropic otherwise)
#   gx/gy discrete std = 0.005    -> density ~ 0.0004 (well below spec)
#   gz discrete std = 0.042       -> density ~ 0.003
#
# Use worst-axis (ax) for NoiseAcc so BA doesn't over-trust the noisiest channel.
# v6 tried NoiseAcc=1.5 (5.5× over the correct value) and worked OK but made
# ORB-SLAM3 effectively ignore IMU - this value is the calibrated match.
IMU.NoiseAcc: 2.75e-1      # was 2.0e-2 (13.7× too low); v6 was 1.5 (5.5× too high)
IMU.NoiseGyro: 5.0e-3      # matches measurement; gyro is clean
IMU.GyroWalk: 1.0e-3
IMU.AccWalk: 5.0e-3
IMU.Frequency: 200

# Camera-to-IMU transform (URDF-measured): camera OpenCV (x=right, y=down,
# z=forward) to IMU FLU (x=forward, y=left, z=up). Translation in meters.
Tbc: !!opencv-matrix
   rows: 4
   cols: 4
   dt: f
   data: [ 0.0,  0.0,  1.0, 0.102,
          -1.0,  0.0,  0.0, 0.018,
           0.0, -1.0,  0.0, 0.132,
           0.0,  0.0,  0.0, 1.0]

# Enhanced ORB for forest - more features + more levels
ORBextractor.nFeatures: 3000
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 12
ORBextractor.iniThFAST: 10
ORBextractor.minThFAST: 3

Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3
Viewer.ViewpointX: 0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500
