# IMU params (filter=60, measured exp 15)
IMU.NoiseGyro: 2.2e-2
IMU.NoiseAcc: 5.0e-2
IMU.GyroWalk: 1.0e-3
IMU.AccWalk: 5.0e-3
IMU.Frequency: 60

# CORRECTED Tbc (exp 23 cal):
# - sensor frame: UBR (X=Up, Y=-Forward, Z=-Left), conversion (-sy, -sz, sx) -> FLU
# - body frame after conversion: FLU
# - camera frame: RDF (OpenCV)
# - R_b_c rotates camera vectors to body coords:
#     [[0, 0, 1],   # cam X (right) -> body Y- (right=-left)
#      [-1, 0, 0],  # cam Y (down)  -> body Z- (down=-up)
#      [0, -1, 0]]  # cam Z (fwd)   -> body X+ (forward)
# - t_b_c = camera position in body FLU coords
#     IMU @ base_link (0.190, 0, 0.149)
#     Camera @ base_link (0.292, 0.018, 0.281)
#     diff = (0.102, 0.018, 0.132)
Tbc: !!opencv-matrix
   rows: 4
   cols: 4
   dt: f
   data: [ 0.0,  0.0,  1.0, 0.102,
          -1.0,  0.0,  0.0, 0.018,
           0.0, -1.0,  0.0, 0.132,
           0.0,  0.0,  0.0, 1.0]
