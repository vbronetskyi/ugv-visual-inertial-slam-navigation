# Stock Nav2 baseline - full Nav2 stack (planner + controller + BT + recoveries).
# Used to compare "industry default" vs our custom send_goals_hybrid + pure_pursuit + detour-ring.
#
# Map: /root/isaac_tr_datasets/<route>/teach/teach_outputs/teach_map.yaml (patched at launch).
# Localization: our tf_wall_clock_relay_v55 publishes map->base_link (VIO+anchor from landmark_matcher).

map_server:
  ros__parameters:
    yaml_filename: "/root/isaac_tr_datasets/08_nw_sw/teach/teach_outputs/teach_map.yaml"
    topic_name: "map"
    frame_id: "map"

planner_server:
  ros__parameters:
    expected_planner_frequency: 0.5
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      # v3c: 3.0 was causing planner to return 1-pose (trivial) plans when
      # robot was already within 3 m of a WP; BT then got stuck in wait
      # recovery loop. 1.0 keeps detour possibility alive but not so loose.
      tolerance: 1.0
      use_astar: true
      allow_unknown: true

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    # v3b: raised (was 0.3) so transient no-motion during rotate-in-place
    # doesn't trigger abort immediately.
    failure_tolerance: 3.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # v3b: loosened (was 0.5 m / 10 s).  With use_rotate_to_heading=true
      # robot sometimes rotates in place >10 s without accumulating 0.5 m
      # translation -> "Failed to make progress" aborts every turn.
      required_movement_radius: 0.3
      movement_time_allowance: 30.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 3.0
      yaw_goal_tolerance: 3.14
      stateful: true
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.8
      lookahead_dist: 2.5
      min_lookahead_dist: 1.5
      max_lookahead_dist: 3.5
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 1.0
      transform_tolerance: 0.3
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.3
      approach_velocity_scaling_dist: 1.5
      # v2: was true - inflation_layer already keeps the planned path off
      # obstacles; RPP's forward-sim collision check was redundant and
      # blocked RPP from ever starting to drive when the planned path
      # skimmed inflation edge.
      use_collision_detection: false
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      # v4: reverted rotate_to_heading / allow_reversing (v3 attempt).
      # With allow_reversing=true + rotate_to_heading=true, RPP spent all its
      # time spinning in place to "face" path-heading (sometimes in the
      # reverse direction), never actually translating.  Back to stock
      # forward-only.  The turnaround overshoot we observed in exp 73 v2
      # stays - that's the documented limitation of stock Nav2.
      use_rotate_to_heading: false
      allow_reversing: false
      max_robot_pose_search_dist: 10.0

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.4
      resolution: 0.1
      track_unknown_space: false
      rolling_window: false
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: depth
        depth:
          topic: /depth_points
          data_type: PointCloud2
          marking: true
          clearing: true
          min_obstacle_height: 0.2
          max_obstacle_height: 0.8
          obstacle_max_range: 8.0
          raytrace_max_range: 10.0
          inf_is_valid: false
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.7
        cost_scaling_factor: 3.0
      always_send_full_costmap: true

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_link
      rolling_window: true
      width: 8
      height: 8
      resolution: 0.1
      robot_radius: 0.4
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: depth
        depth:
          topic: /depth_points
          data_type: PointCloud2
          marking: true
          clearing: true
          min_obstacle_height: 0.2
          max_obstacle_height: 0.8
          obstacle_max_range: 5.0
          raytrace_max_range: 6.0
          inf_is_valid: false
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.6
        cost_scaling_factor: 3.0
      always_send_full_costmap: true

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.3
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 1.0

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    # v2: canonical Nav2 "visit these WPs, skip bad ones" - delegates
    # each WP to NavigateToPose BT; if a WP fails (timeout, no plan,
    # unreachable), logs it and moves on to the next.
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 0
